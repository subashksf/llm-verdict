# configs/models/claude-sonnet-4-6.yaml
name: claude-sonnet-4-6              # your internal handle, used in CLI + DuckDB
litellm_model: anthropic/claude-sonnet-4-6
api_key_env: ANTHROPIC_API_KEY      # env var name, never the key itself
pricing:
  input_per_mtok_usd: 3.00
  output_per_mtok_usd: 15.00
  as_of: "2026-06-10"               # date-stamp pricing; it changes
limits:
  max_concurrency: 4
  requests_per_minute: 50           # stay under your tier's rate limit
defaults:
  temperature: 0.0
  max_tokens: 4096
metadata:
  provider: anthropic
  family: claude-sonnet              # powers `verdict report timeline --model-family`
  context_window: 200000